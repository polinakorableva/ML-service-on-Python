global:
  scrape_interval: 15s      # как часто собирать метрики
  evaluation_interval: 15s  # как часто вычислять правила алертов

scrape_configs:

  - job_name: "fastapi"
    static_configs:
      - targets: ["api:8000"]    # хост:порт нашего FastAPI
    metrics_path: "/metrics"     # путь к эндпоинту метрик